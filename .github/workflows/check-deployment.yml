name: Check Deployment

on:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify Page is Live
    runs-on: ubuntu-latest
    steps:
      - name: Check coaching.pms2c.com is reachable (retry every 30s, max 5min)
        run: |
          URL="https://coaching.pms2c.com/"
          for i in $(seq 1 10); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            echo "Tentative $i — HTTP Status: $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ La page est en ligne et répond correctement (HTTP 200)."
              exit 0
            fi
            echo "⏳ Pas encore prêt. Nouvelle tentative dans 30s..."
            sleep 30
          done
          echo "❌ La page renvoie encore une erreur après 5 minutes. Vérifiez votre déploiement !"
          exit 1
